<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Contact Management Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="page">
        <section class="hero">
            <div class="hero-content">
                <p class="badge">Secure Full-Stack Project</p>
                <h1>Secure Contact Management Dashboard</h1>
                <p class="hero-text">
                    A modern contact system built with Node.js, Express and PostgreSQL.
                    Messages are validated, stored securely and managed through an admin dashboard.
                </p>
            </div>

            <div class="contact-card">
                <h2>Contact us</h2>
                <p>Send your message securely.</p>

                <form id="contactForm">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" placeholder="Your name">
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="your@email.com">
                    </div>

                    <div class="form-group">
                        <label for="subject">Subject</label>
                        <input type="text" id="subject" placeholder="Message subject">
                    </div>

                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" placeholder="Write your message"></textarea>
                    </div>

                    <button type="submit">Send Message</button>
                </form>

                <p id="formMessage"></p>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
